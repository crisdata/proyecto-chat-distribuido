# .github/workflows/docker.yml
# Pipeline de CI/CD para construir y publicar las imágenes Docker
# del sistema Vibe en DockerHub.
#
# Trigger: cada push a la rama main.
#
# El pipeline construye 3 imágenes en paralelo:
#   - crisdatap/vibe-api      (FastAPI + WebSocket + endpoints)
#   - crisdatap/vibe-worker   (consumer RabbitMQ)
#   - crisdatap/vibe-frontend (React + Nginx)
#
# Cada imagen se publica con 2 tags:
#   - latest          para uso simple en docker-compose
#   - <commit-sha>    para trazabilidad y rollback si fuera necesario

name: Build y publicación de imágenes Docker

on:
  push:
    branches:
      - main
  # Permite ejecutar el pipeline manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  # ── Tests automatizados ─────────────────────────────────────────────────
  tests:
    name: Ejecutar pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias de test
        run: pip install -r requirements-dev.txt

      - name: Ejecutar pytest
        run: pytest -q

  # ── Build de la imagen de la API ────────────────────────────────────────
  build-api:
    name: Build y push de la API
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build de la imagen del Worker ───────────────────────────────────────
  build-worker:
    name: Build y push del Worker
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build de la imagen del Frontend ─────────────────────────────────────
  build-frontend:
    name: Build y push del Frontend
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de la imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Notificación final ───────────────────────────────────────────────────
  notify-success:
    name: Notificar éxito
    needs: [build-api, build-worker, build-frontend]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Resumen del despliegue
        run: |
          echo "Pipeline completado exitosamente"
          echo ""
          echo "Imágenes publicadas en DockerHub:"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/vibe-api:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/vibe-worker:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/vibe-frontend:latest"
          echo ""
          echo "Tag específico de esta build: ${{ github.sha }}"
          echo ""
          echo "Para desplegar en cualquier máquina:"
          echo "  docker compose -f docker-compose.prod.yml up -d"
