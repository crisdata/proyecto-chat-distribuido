# nginx.conf
# Configuración de Nginx para el frontend en producción.
# Sirve los archivos estáticos de React y hace proxy
# de /api hacia FastAPI y /ws hacia el endpoint WebSocket.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy HTTP hacia la API de FastAPI
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy WebSocket hacia FastAPI
    # Los headers Upgrade y Connection son obligatorios para WS.
    # Sin ellos Nginx cierra la conexión antes de que se establezca.
    location /ws/ {
        proxy_pass http://api:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # React Router — redirige todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos compilados por Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}