# nginx.conf
# Configuración de Nginx para el frontend en producción.
# Sirve los archivos estáticos de React y hace proxy
# de /api hacia el contenedor de FastAPI.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy hacia la API de FastAPI
    # Todas las solicitudes a /api se redirigen al contenedor api
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React Router — redirige todas las rutas al index.html
    # Necesario para que las rutas del SPA funcionen al recargar
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos compilados por Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
