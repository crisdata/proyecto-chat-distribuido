services:

  # ── Frontend React + Nginx ────────────────────────────────────────────
  # Único punto de entrada desde el exterior.
  # Solo pertenece a public_network para evitar acceso directo a datos.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - public_network

  # ── API principal ─────────────────────────────────────────────────────
  # Mediador entre todas las capas.
  # Pertenece a las tres redes porque coordina frontend, mensajería y datos.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat_api
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - public_network
      - app_network
      - data_network

  # ── Base de datos relacional ──────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: chat_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Caché y coordinación distribuida ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chat_redis
    restart: unless-stopped
    networks:
      - data_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nodo de inteligencia artificial local ────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: chat_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Broker de mensajes ────────────────────────────────────────────────
  # RabbitMQ desacopla la API del proceso de notificación.
  # El panel de administración está disponible en http://localhost:15672
  # Solo accesible desde app_network — aislado del exterior.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chat_rabbitmq
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    networks:
      - public_network
      - app_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Worker de mensajería ──────────────────────────────────────────────
  # Consume eventos de RabbitMQ y notifica a los receptores via WebSocket.
  # Necesita app_network para hablar con RabbitMQ y la API,
  # y data_network para actualizar Redis.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: chat_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - app_network
      - data_network

# ── Volúmenes persistentes ────────────────────────────────────────────
volumes:
  db_data:
  ollama_data:
  rabbitmq_data:

# ── Redes segmentadas por capa ────────────────────────────────────────
networks:

  # Capa pública — frontend y API expuestos al navegador
  public_network:
    driver: bridge

  # Capa de aplicación — RabbitMQ y worker
  # internal: true bloquea salida a internet desde esta capa
  app_network:
    driver: bridge
    internal: true

  # Capa de datos — base de datos, caché e IA
  # internal: true garantiza que ningún dato sea accesible desde fuera
  data_network:
    driver: bridge
    internal: true